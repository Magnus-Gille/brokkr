# Brokkr · retain enough host journal history to investigate an unplanned reboot.
#
# This is deliberately a drop-in rather than a replacement for journald.conf.
# The cap is conservative for small SD-card-backed hosts: it preserves several
# boots of useful diagnostics without letting logs compete indefinitely with
# application data. Operators may choose a different local policy, but should
# retain persistent storage and an explicit finite cap.
[Journal]
Storage=persistent
SystemMaxUse=256M
SystemKeepFree=1G
