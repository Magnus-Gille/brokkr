# Copy to timemachine.conf and adapt the path and account locally.
# timemachine.conf is ignored because it describes a live storage host.
[TimeMachine]
   path = /srv/backups/timemachine
   valid users = backupuser
   read only = no
   vfs objects = catia fruit streams_xattr
   fruit:time machine = yes

# Consider setting `fruit:time machine max size` locally so one client cannot
# consume the whole volume. Choose the limit from the actual storage budget.
